name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    name: Release (${{ matrix.os }} × ${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        os:   [ubuntu-latest, macos-latest, windows-latest]
        arch: [amd64, arm64]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25"
          architecture: ${{ matrix.arch }}

      - name: Build
        env:
          CGO_ENABLED: 1
        run: |
          GOOS=${{ matrix.os }}
          GOARCH=${{ matrix.arch }}
          # normalize os name for windows
          if [ "$GOOS" = "windows-latest" ]; then GOOS=windows; fi
          if [ "$GOOS" = "ubuntu-latest" ]; then GOOS=linux; fi
          if [ "$GOOS" = "macos-latest" ]; then GOOS=darwin; fi
          ext=""
          if [ "$GOOS" = "windows" ]; then ext=".exe"; fi
          go build -ldflags "-s -w" -o dfmc${ext} ./cmd/dfmc

      - name: Determine output name
        id: artifact
        shell: bash
        run: |
          ext=""
          if [ "${{ matrix.os }}" = "windows-latest" ]; then ext=".exe"; fi
          echo "name=dfmc-${TAG}-${{ matrix.os }}-${{ matrix.arch }}${ext}" >> $GITHUB_OUTPUT
          echo "ext=${ext}" >> $GITHUB_OUTPUT
        env:
          TAG: ${{ github.ref_name }}

      - name: Upload artifact
        uses: actions/upload-release-asset@v4
        with:
          upload-url: ${{ github.event.release.upload_url }}
          asset-path: dfmc${{ steps.artifact.outputs.ext }}
          asset-name: ${{ steps.artifact.outputs.name }}
          asset-content-type: application/octet-stream

  checksums:
    name: Checksums
    needs: release
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: dfmc-*
          path: artifacts
          merge-multiple: true

      - name: Compute checksums
        run: |
          for f in artifacts/*; do
            echo "$(sha256sum "$f" | cut -d' ' -f1)  $(basename "$f")" >> checksums.txt
          done
          cat checksums.txt

      - name: Upload checksums
        uses: actions/upload-release-asset@v4
        with:
          upload-url: ${{ github.event.release.upload_url }}
          asset-path: checksums.txt
          asset-name: checksums.txt
          asset-content-type: text/plain