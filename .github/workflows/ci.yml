name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GO_VERSION: "1.26.3"

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download Go modules
        run: go mod download

      - name: Test
        run: go test -count=1 ./...

      - name: Build
        run: go build -ldflags "-s -w" -o dfmc ./cmd/dfmc

      - name: Build without CGO
        env:
          CGO_ENABLED: 0
        run: go build -ldflags "-s -w" -o dfmc-nocgo ./cmd/dfmc

      - name: dfmc version (Unix)
        if: runner.os != 'Windows'
        run: ./dfmc version

      - name: dfmc version (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\dfmc version

      - name: dfmc doctor (Unix)
        if: runner.os != 'Windows'
        run: ./dfmc doctor

      - name: dfmc doctor (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\dfmc doctor

  race:
    name: Race Test (Linux)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Race test
        env:
          CGO_ENABLED: 1
        run: go test -race -count=1 ./...

  lint:
    name: Lint and Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: gofmt check
        shell: bash
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "gofmt would reformat:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: staticcheck
        shell: bash
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...

      - name: govulncheck
        shell: bash
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  coverage:
    name: Coverage report (informational)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      # Coverage is informational, NOT a gate. We publish the per-package
      # numbers so a PR reviewer can scan them in the action log without
      # running the suite locally — but a hard threshold would either be
      # set artificially low (no signal) or break unrelated PRs that
      # happen to cross the line. Trust the reviewer's eye on the
      # report; gate on tests passing instead.
      - name: Run tests with coverage
        env:
          CGO_ENABLED: 1
        shell: bash
        run: |
          go test -count=1 -covermode=atomic -coverprofile=coverage.out ./... || true
          if [ -f coverage.out ]; then
            echo "::group::Per-package coverage"
            go tool cover -func=coverage.out | tail -50
            echo "::endgroup::"
            total=$(go tool cover -func=coverage.out | awk '/^total:/ {print $3}')
            echo "Total coverage: $total"
            echo "TOTAL_COVERAGE=$total" >> $GITHUB_ENV
          fi

      - name: Upload coverage profile
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-profile
          path: coverage.out
          if-no-files-found: warn

  goreleaser-check:
    # Validates .goreleaser.yaml on every push/PR so a release-config
    # mistake is caught here instead of at tag time (release.yml only runs on
    # tags). The install step exercises goreleaser-action@v7 itself and pins
    # the same `~> v2` goreleaser the release uses, so this also covers the
    # action bump that release.yml can't verify on a PR.
    name: GoReleaser config check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install GoReleaser
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          install-only: true

      - name: Validate release config
        shell: bash
        run: |
          # `goreleaser check` exits 1 on an INVALID config (a real release
          # breaker — e.g. a field the schema rejects) and 2 on a valid but
          # DEPRECATED one. Gate on the former only; surface deprecations as
          # a warning so a future goreleaser removal stays on the radar
          # without blocking unrelated PRs.
          set +e
          output=$(goreleaser check 2>&1)
          code=$?
          echo "$output"
          if [ "$code" -eq 1 ]; then
            echo "::error::.goreleaser.yaml is invalid — the next release would fail to parse"
            exit 1
          fi
          if [ "$code" -eq 2 ]; then
            echo "::warning::.goreleaser.yaml uses deprecated properties (valid today; see log)"
          fi
