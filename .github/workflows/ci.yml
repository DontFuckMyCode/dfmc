name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test (${{ matrix.os }} × ${{ matrix.arch }})
    strategy:
      fail-fast: false
      matrix:
        os:   [ubuntu-latest, macos-latest, windows-latest]
        arch: [amd64, arm64]
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout
        uses: actions/checkout@b4ffde65f46336ab00eb68f20aedd27de2f3d3f

      - name: Set up Go
        uses: actions/setup-go@0a12ed9e1a4ce729c53f80fc1f1472bca80d2f2d
        with:
          go-version: "1.25"
          architecture: ${{ matrix.arch }}

      - name: Set up Go cache
        uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e26841
        if: runner.os != 'Windows'
        with:
          path: |
            ~/.cache/go-build
            ${{ github.workspace }}/pkg/mod
          key: ${{ runner.os }}-${{ matrix.arch }}-go1.25-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.arch }}-go1.25-

      - name: Set up Go cache (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $mod = "$env:GITHUB_WORKSPACE\pkg\mod"
          $cc   = "$env:LOCALAPPDATA\go-build"
          if (-not (Test-Path $mod))  { New-Item -ItemType Directory -Path $mod -Force | Out-Null }
          if (-not (Test-Path $cc))   { New-Item -ItemType Directory -Path $cc -Force | Out-Null }

      - name: Download Go modules
        run: go mod download

      - name: Vet
        run: go vet ./...

      - name: Build (CGO)
        env:
          CGO_ENABLED: 1
        run: go build -ldflags "-s -w" -o dfmc ./cmd/dfmc

      - name: Build (no CGO — should succeed, AST falls back to regex)
        env:
          CGO_ENABLED: 0
        run: go build -ldflags "-s -w" -o dfmc-nocgo ./cmd/dfmc

      - name: Test (race)
        env:
          CGO_ENABLED: 1
        run: go test -race -count=1 ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@b4ffde65f46336ab00eb68f20aedd27de2f3d3f
      - uses: actions/setup-go@0a12ed9e1a4ce729c53f80fc1f1472bca80d2f2d
        with:
          go-version: "1.25"
      - name: go vet
        run: go vet ./...
      - name: gofmt check
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "gofmt would reformat:"
            echo "$unformatted"
            exit 1
          fi

  binary-smoke:
    name: Binary smoke (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@b4ffde65f46336ab00eb68f20aedd27de2f3d3f
      - uses: actions/setup-go@0a12ed9e1a4ce729c53f80fc1f1472bca80d2f2d
        with:
          go-version: "1.25"
      - name: Build
        env:
          CGO_ENABLED: 1
        run: go build -ldflags "-s -w" -o dfmc ./cmd/dfmc
      - name: dfmc version
        run: ./dfmc version
        shell: ${{ matrix.os == 'windows-latest' && 'pwsh' || 'bash' }}
      - name: dfmc doctor
        run: ./dfmc doctor
        shell: ${{ matrix.os == 'windows-latest' && 'pwsh' || 'bash' }}
