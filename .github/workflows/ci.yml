name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

env:
  GO_VERSION: "1.26.2"

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - name: Checkout
        uses: actions/checkout@b4ffde65f46336ab00eb68f20aedd27de2f3d3f

      - name: Set up Go
        uses: actions/setup-go@0a12ed9e1a4ce729c53f80fc1f1472bca80d2f2d
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Download Go modules
        run: go mod download

      - name: Test
        run: go test -count=1 ./...

      - name: Build
        run: go build -ldflags "-s -w" -o dfmc ./cmd/dfmc

      - name: Build without CGO
        env:
          CGO_ENABLED: 0
        run: go build -ldflags "-s -w" -o dfmc-nocgo ./cmd/dfmc

      - name: dfmc version (Unix)
        if: runner.os != 'Windows'
        run: ./dfmc version

      - name: dfmc version (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\dfmc version

      - name: dfmc doctor (Unix)
        if: runner.os != 'Windows'
        run: ./dfmc doctor

      - name: dfmc doctor (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: .\dfmc doctor

  race:
    name: Race Test (Linux)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@b4ffde65f46336ab00eb68f20aedd27de2f3d3f

      - name: Set up Go
        uses: actions/setup-go@0a12ed9e1a4ce729c53f80fc1f1472bca80d2f2d
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Race test
        env:
          CGO_ENABLED: 1
        run: go test -race -count=1 ./...

  lint:
    name: Lint and Vulnerability Scan
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@b4ffde65f46336ab00eb68f20aedd27de2f3d3f

      - name: Set up Go
        uses: actions/setup-go@0a12ed9e1a4ce729c53f80fc1f1472bca80d2f2d
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: gofmt check
        shell: bash
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "gofmt would reformat:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: staticcheck
        shell: bash
        run: |
          go install honnef.co/go/tools/cmd/staticcheck@latest
          staticcheck ./...

      - name: govulncheck
        shell: bash
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
