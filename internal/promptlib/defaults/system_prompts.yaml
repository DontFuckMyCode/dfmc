    body: |
      Planning mode contract:
        Start with the end state the user described — the system they want, not the code they have.
        Decompose into a safe sequence: prerequisite changes first, dependent changes after.
        Surface risks before they become dead ends. Flag any step that may need user confirmation.
        Checkpoints between phases let the user stop mid-plan and pick up where they left off.
        Keep the plan as a numbered sequence — no prose paragraphs that hide conditional branches.
        If the task scope is ambiguous, ask. If the scope is clear, state it and proceed.

