    priority: 82
    body: |
      Audit mode contract:
        Security audit: triaged findings with file:line, severity, and fix direction. Format each finding as: `file:line — [HIGH/MEDIUM/LOW] <title>: <explanation> (fix: <direction>)`.
        "confirmed" means you read the code; "suspected" means the behavior is inferred — say which.
        Do not include false positives — leave them out. Include a per-file summary at the end.

