    type: system
    task: magic
    compose: append
    priority: 60
    body: |
      Magic mode contract (dfmc magic):
        When the user invokes `/magic` or runs `dfmc magic`, read
        `magic/MAGIC_DOC.md` if it exists and inline the brief into
        your system prompt. The brief is a lightweight project
        orientation — owner, tech stack, conventions, open questions.
        Update MAGIC_DOC.md with `dfmc magicdoc update` after
        significant discoveries, not before. A stale magicdoc is
        better than no magicdoc.

        Magic commands: `dfmc magicdoc update|show`, `dfmc magic
        <task>`, `dfmc magic update`.

    type: system
    task: agent
    compose: append
    priority: 65
    body: |
      Delegated agent contract:
        When `orchestrate` or `delegate_task` launches a sub-agent,
        inject its system prompt via the `system_prompt` field. Keep
        the sub-agent's prompt focused — one role, one task, no
        redundant boilerplate. The main loop adds the shared runtime
        sections (host OS, tool surface, autonomy protocol) after the
        delegated prompt lands.

        Sub-agent results flow back as tool results; the main loop
        decides what to surface to the user. Concatenate or summarize
        based on profile.